<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>glowmoji — local dev</title>
  <script src="./dist/glowmoji.global.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #0f0f0f; --border: #1c1c1c;
      --text: #fff; --muted: #888; --dim: #555;
    }
    body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--muted); min-height: 100vh; transition: background .2s, color .2s; }
    body.light {
      --bg: #f8f8f8; --surface: #fff; --border: #e5e5e5;
      --text: #111; --muted: #555; --dim: #999;
    }
    body.light .card { background: var(--surface); border-color: var(--border); }
    body.light .field-row input { background: #f0f0f0; border-color: #ddd; color: #111; }
    body.light .pill.active { background: #e8e8e8; color: #111; border-color: #ccc; }
    body.light .pill { color: #888; border-color: #ddd; }
    body.light .pill:hover { color: #333; border-color: #bbb; }
    .page { max-width: 720px; margin: 0 auto; padding: 4rem 2rem 6rem; }
    .hero { display: flex; align-items: center; gap: 1.25rem; margin-bottom: 3.5rem; }
    .hero-text h1 { font-size: 1.5rem; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
    .hero-text p { font-size: 0.85rem; color: var(--dim); margin-top: 4px; }
    .theme-toggle { font-size: 1rem; background: none; border: none; cursor: pointer; color: var(--dim); padding: 4px 6px; margin-left: auto; }
    .theme-toggle:hover { color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
    .field-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }
    .field-row input { flex: 1; font-size: 0.875rem; background: #161616; border: 1px solid #222; color: #fff; padding: 8px 12px; border-radius: 8px; font-family: inherit; outline: none; transition: border-color .15s; }
    .field-row input:focus { border-color: #444; }
    .color-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
    .color-row label { font-size: 0.75rem; color: #666; }
    .color-row input[type=color] { width: 32px; height: 32px; border: 1px solid #222; border-radius: 6px; background: none; cursor: pointer; padding: 2px; }
    .color-clear { font-size: 0.7rem; color: #444; background: none; border: 1px solid var(--border); border-radius: 5px; padding: 3px 8px; cursor: pointer; font-family: inherit; transition: color .15s, border-color .15s; }
    .color-clear:hover { color: #888; border-color: #333; }
    .pill-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { font-size: 0.75rem; padding: 5px 14px; border: 1px solid var(--border); border-radius: 999px; background: transparent; color: #444; cursor: pointer; font-family: inherit; transition: all .15s; }
    .pill:hover { color: #888; border-color: #333; }
    .pill.active { background: #1a1a1a; color: #fff; border-color: #3a3a3a; }
    .label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
    .grid { display: flex; gap: 1.25rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 2.5rem; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cell-lbl { font-size: 0.7rem; color: var(--dim); }
    .avatar-wrap { display: block; flex-shrink: 0; transition: transform .15s, opacity .15s; }
    .avatar-wrap:hover { transform: scale(1.06); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div id="heroAvatar"></div>
      <div class="hero-text">
        <h1>glowmoji</h1>
        <p>deterministic glowing avatars — type a name, get a face</p>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="toggle light/dark">◐</button>
    </div>

    <div class="card">
      <div class="field-row">
        <input type="text" id="nameInput" placeholder="type a name…" value="igarren" oninput="updateAll()"/>
      </div>
      <div class="color-row">
        <label>color</label>
        <input type="color" id="colorInput" value="#a78bfa"/>
        <button class="color-clear" onclick="clearColor()">use palette</button>
        <span id="colorMode" style="font-size:0.7rem;color:#444;margin-left:4px;"></span>
      </div>
      <div class="pill-group">
        <button class="pill" id="btn-square" onclick="setShape('square')">square</button>
        <button class="pill active" id="btn-rounded" onclick="setShape('rounded')">rounded</button>
        <button class="pill" id="btn-circle" onclick="setShape('circle')">circle</button>
      </div>
      <div style="margin-top:1.25rem;">
        <div class="label" style="margin-bottom:0.5rem;">click animation</div>
        <div class="pill-group">
          <button class="pill active" id="btn-anim-blink" onclick="setClickAnim('blink')">blink</button>
          <button class="pill" id="btn-anim-hurt" onclick="setClickAnim('hurt')">hurt</button>
          <button class="pill" id="btn-anim-kiss" onclick="setClickAnim('kiss')">kiss</button>
        </div>
      </div>
    </div>

    <div class="label">sizes</div>
    <div class="grid" id="sizeGrid"></div>

    <div class="label">name variations</div>
    <div class="grid" id="avatarGrid"></div>
  </div>

  <script>
    const { mount, getBorderRadius } = glowmoji;

    let currentShape = 'rounded';
    let currentClickAnim = 'blink';
    let useColor = false;
    const NAMES = ['Alice','Bob','Cara','Dev','Eli','Faye','Max','Zara'];
    const stopFns = [];

    function getColor() { return useColor ? document.getElementById('colorInput').value : null; }
    function clearColor() { useColor = false; document.getElementById('colorMode').textContent = ''; updateAll(); }

    document.getElementById('colorInput').addEventListener('input', () => {
      useColor = true;
      document.getElementById('colorMode').textContent = 'custom';
      updateAll();
    });

    function setShape(s) {
      currentShape = s;
      document.querySelectorAll('.pill-group .pill').forEach(b => {
        if (b.id.startsWith('btn-') && !b.id.startsWith('btn-anim-')) b.classList.remove('active');
      });
      document.getElementById('btn-' + s).classList.add('active');
      updateAll();
    }

    function setClickAnim(a) {
      currentClickAnim = a;
      ['btn-anim-blink','btn-anim-hurt','btn-anim-kiss'].forEach(id => document.getElementById(id).classList.remove('active'));
      document.getElementById('btn-anim-' + a).classList.add('active');
      updateAll();
    }

    function renderCell(name, size) {
      const color = getColor();
      const br = getBorderRadius(currentShape, size);
      const wrap = document.createElement('div');
      wrap.className = 'avatar-wrap';
      wrap.style.cssText = `width:${size}px;height:${size}px;`;
      const isLight = document.body.classList.contains('light');
      const stop = mount(wrap, { name, size, shape: currentShape, color, transparent: isLight }, { onClickAnimation: currentClickAnim });
      stopFns.push(stop);
      return wrap;
    }

    function toggleTheme() { document.body.classList.toggle('light'); updateAll(); }

    function updateAll() {
      // stop all previous blink timers
      stopFns.splice(0).forEach(s => s());

      const custom = document.getElementById('nameInput').value.trim() || 'igarren';

      // hero
      const heroWrap = renderCell(custom, 80);
      const heroEl = document.getElementById('heroAvatar');
      heroEl.innerHTML = '';
      heroEl.appendChild(heroWrap);

      // sizes
      const sc = document.getElementById('sizeGrid');
      sc.innerHTML = '';
      [24, 32, 48, 64, 80, 96].forEach(sz => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const lbl = document.createElement('span');
        lbl.className = 'cell-lbl';
        lbl.textContent = sz + 'px';
        cell.appendChild(renderCell(custom, sz));
        cell.appendChild(lbl);
        sc.appendChild(cell);
      });

      // name grid
      const ag = document.getElementById('avatarGrid');
      ag.innerHTML = '';
      const names = [custom, ...NAMES.filter(n => n.toLowerCase() !== custom.toLowerCase()).slice(0, 7)];
      names.forEach(n => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const lbl = document.createElement('span');
        lbl.className = 'cell-lbl';
        lbl.textContent = n;
        cell.appendChild(renderCell(n, 64));
        cell.appendChild(lbl);
        ag.appendChild(cell);
      });
    }

    updateAll();
  </script>
</body>
</html>
